training:
  epochs: 100
dataset:
  name: wine_quality
  filepath: ./data/wine_quality.csv
  numerical_columns:
  - fixed acidity
  - volatile acidity
  - citric acid
  - residual sugar
  - chlorides
  - free sulfur dioxide
  - total sulfur dioxide
  - density
  - pH
  - sulphates
  - alcohol
  target_column: quality
  test_size: 0.2
  random_state: 42
  batch_size: null
  num_classes: null
model:
  name: random_forest_classifier
  n_estimators: 100
  max_depth: 10
  random_state: 0
env:
  debug: true
  mlflow_uri: http://localhost:5000
  dataset_fraction: 0.1
  max_epochs: 20
